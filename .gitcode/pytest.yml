name: Pytest CI

# 触发条件：推送到 main 分支时运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 任务（GitCode 自带共享 Runner，无需配置）
jobs:
  test:
    runs-on: euleros-2.10_amd64  # GitCode 共享 Runner{insert\_element\_3\_}
    steps:
      - name: 检出代码
        uses: checkout-action@v1

      - name: 设置 Python
        uses: setup-python@v1
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # 如果有 requirements.txt
          # pip install -r requirements.txt

      - name: 运行测试
        run: |
          pytest tests/unit/ -v